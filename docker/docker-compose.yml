version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: zhulinsma-postgres
    environment:
      POSTGRES_USER: zhulin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zhulin123}
      POSTGRES_DB: zhulinsma
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - zhulin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhulin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: zhulinsma-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - zhulin-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: zhulinsma-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: zhulin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq123}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP协议端口
      - "15672:15672" # 管理界面端口
    networks:
      - zhulin-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: zhulinsma-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # API端口
      - "9001:9001" # 控制台端口
    networks:
      - zhulin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # 后端API服务
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: zhulinsma-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
    environment:
      # 应用配置
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-this-in-production-with-secure-random-key}
      
      # 数据库配置
      DATABASE_URL: postgresql://zhulin:${DB_PASSWORD:-zhulin123}@postgres:5432/zhulinsma
      
      # Redis配置
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      
      # 消息队列配置
      RABBITMQ_URL: amqp://zhulin:${RABBITMQ_PASSWORD:-rabbitmq123}@rabbitmq:5672/
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/2
      
      # JWT配置
      JWT_SECRET_KEY: ${APP_SECRET_KEY:-change-this-in-production-with-secure-random-key}
      
      # 文件存储配置
      FILE_STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: false
      
      # 其他配置
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ../logs:/app/logs
      - ../uploads:/app/uploads
      - ./config:/app/config:ro
    ports:
      - "8000:8000"
    networks:
      - zhulin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Celery工作进程
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: zhulinsma-celery-worker
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      # 复用API的环境变量
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql://zhulin:${DB_PASSWORD:-zhulin123}@postgres:5432/zhulinsma
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/2
    command: >
      sh -c "cd /app &&
             celery -A src.tasks.celery_app worker
             --loglevel=info
             --concurrency=4
             --hostname=worker@%h
             --queues=default,email,media"
    volumes:
      - ../logs:/app/logs
      - ../uploads:/app/uploads
    networks:
      - zhulin-network
    restart: unless-stopped

  # Celery Beat调度器
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: zhulinsma-celery-beat
    depends_on:
      celery-worker:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql://zhulin:${DB_PASSWORD:-zhulin123}@postgres:5432/zhulinsma
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/2
    command: >
      sh -c "cd /app &&
             celery -A src.tasks.celery_app beat
             --loglevel=info
             --scheduler=celery.beat.PersistentScheduler"
    volumes:
      - ../logs:/app/logs
      - celerybeat:/app/celerybeat
    networks:
      - zhulin-network
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: zhulinsma-nginx
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../static:/app/static:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - zhulin-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: zhulinsma-prometheus
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - zhulin-network
    restart: unless-stopped

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: zhulinsma-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - zhulin-network
    restart: unless-stopped

networks:
  zhulin-network:
    driver: bridge
    name: zhulinsma-network

volumes:
  postgres_data:
    name: zhulinsma-postgres-data
  redis_data:
    name: zhulinsma-redis-data
  rabbitmq_data:
    name: zhulinsma-rabbitmq-data
  minio_data:
    name: zhulinsma-minio-data
  celerybeat:
    name: zhulinsma-celerybeat-data
  prometheus_data:
    name: zhulinsma-prometheus-data
  grafana_data:
    name: zhulinsma-grafana-data